<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — AutoRent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 380px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(15, 23, 42, .08), 0 1px 4px rgba(15, 23, 42, .06);
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: -.5px;
    }

    .brand-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: #0f172a;
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #f43f5e;
      box-shadow: 0 0 0 3px rgba(244, 63, 94, .15);
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper input {
      padding-right: 42px;
    }

    .toggle-pw {
      position: absolute;
      right: 0;
      top: 0;
      width: 42px;
      height: 42px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 16px;
      padding: 0;
      flex-shrink: 0;
    }

    .toggle-pw:hover { color: #6b7280; }

    #btn-login {
      width: 100%;
      height: 42px;
      background: #f43f5e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, opacity .15s;
    }

    #btn-login:hover:not(:disabled) { background: #e11d48; }
    #btn-login:disabled { opacity: .65; cursor: not-allowed; }

    #login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      border-radius: 8px;
      color: #be123c;
      font-size: 13px;
      line-height: 1.4;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-name">AutoRent</div>
    <div class="brand-subtitle">Fleet Management System</div>
  </div>

  <div class="form-group">
    <label for="inp-username">Username</label>
    <input id="inp-username" type="text" placeholder="Enter username" autocomplete="username" />
  </div>

  <div class="form-group">
    <label for="inp-password">Password</label>
    <div class="password-wrapper">
      <input id="inp-password" type="password" placeholder="Enter password" autocomplete="current-password" />
      <button class="toggle-pw" type="button" id="btn-toggle-pw" aria-label="Show password">
        <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
  </div>

  <button id="btn-login" type="button">Sign In</button>

  <div id="login-error"></div>
</div>

<p class="footer-note">Default login: admin / admin123</p>

<script>
  // Redirect if already logged in
  if (sessionStorage.getItem('autorent_token')) {
    window.location.href = '/index.html';
  }

  const btnLogin   = document.getElementById('btn-login');
  const btnToggle  = document.getElementById('btn-toggle-pw');
  const inpUser    = document.getElementById('inp-username');
  const inpPass    = document.getElementById('inp-password');
  const errorBox   = document.getElementById('login-error');
  const iconEye    = document.getElementById('icon-eye');
  const iconEyeOff = document.getElementById('icon-eye-off');

  // Show / hide password toggle
  btnToggle.addEventListener('click', () => {
    const isPassword = inpPass.type === 'password';
    inpPass.type = isPassword ? 'text' : 'password';
    iconEye.style.display    = isPassword ? 'none'  : '';
    iconEyeOff.style.display = isPassword ? ''      : 'none';
    btnToggle.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });

  // Submit on Enter key in either field
  [inpUser, inpPass].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  });

  btnLogin.addEventListener('click', login);

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  async function login() {
    const username = inpUser.value.trim();
    const password = inpPass.value;

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    errorBox.style.display = 'none';
    btnLogin.disabled = true;
    btnLogin.textContent = 'Signing in...';

    try {
      const res = await fetch('http://localhost:3000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (res.ok) {
        sessionStorage.setItem('autorent_token', data.token);
        sessionStorage.setItem('autorent_user', JSON.stringify(data.user));
        window.location.href = '/index.html';
      } else {
        showError(data.error || 'Login failed. Please try again.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Sign In';
      }
    } catch {
      showError('Cannot connect to server.');
      btnLogin.disabled = false;
      btnLogin.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
