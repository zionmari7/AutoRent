<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoRent — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f8fafc;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:14px;border:1px solid rgba(15,23,42,0.08);padding:40px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(15,23,42,0.06)}
    .logo-mark{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#0f172a;letter-spacing:-0.5px;margin-bottom:4px}
    .logo-mark span{color:#f43f5e}
    .logo-sub{font-size:12px;color:#94a3b8;margin-bottom:32px}
    label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:5px}
    .field{margin-bottom:16px}
    .pw-wrap{position:relative;display:flex;align-items:center}
    input[type=text],input[type=password]{width:100%;padding:10px 13px;border:1px solid rgba(15,23,42,0.12);border-radius:8px;font-size:14px;font-family:inherit;color:#0f172a;outline:none;transition:border-color .15s}
    input:focus{border-color:#f43f5e}
    .pw-wrap input{padding-right:40px}
    .pw-toggle{position:absolute;right:11px;background:none;border:none;cursor:pointer;color:#94a3b8;font-size:13px;padding:2px 4px}
    .btn-login{width:100%;padding:11px;background:#f43f5e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px;transition:background .13s}
    .btn-login:hover:not(:disabled){background:#e11d48}
    .btn-login:disabled{opacity:0.6;cursor:not-allowed}
    .error{display:none;color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;border-radius:8px;padding:10px 13px;font-size:13px;margin-top:12px}
    .hint{text-align:center;font-size:11.5px;color:#94a3b8;margin-top:20px}
    .hint code{background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:11px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-mark">Auto<span>Rent</span></div>
  <div class="logo-sub">Fleet Management System — Sign In</div>
  <div class="field">
    <label for="inp-username">Username</label>
    <input type="text" id="inp-username" placeholder="admin" autocomplete="username" />
  </div>
  <div class="field">
    <label for="inp-password">Password</label>
    <div class="pw-wrap">
      <input type="password" id="inp-password" placeholder="••••••••" autocomplete="current-password" />
      <button class="pw-toggle" type="button" id="btn-pw-toggle">👁</button>
    </div>
  </div>
  <button class="btn-login" id="btn-login">Sign In</button>
  <div class="error" id="login-error"></div>
  <div class="hint">Default: <code>admin</code> / <code>admin123</code></div>
</div>
<script>
  if (sessionStorage.getItem('autorent_token')) window.location.href = '/index.html';
const inp = document.getElementById('inp-username');
const pwd = document.getElementById('inp-password');
const btn = document.getElementById('btn-login');
const err = document.getElementById('login-error');
document.getElementById('btn-pw-toggle').addEventListener('click', () => {
  pwd.type = pwd.type === 'password' ? 'text' : 'password';
});
[inp, pwd].forEach(el => el.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
}));
btn.addEventListener('click', doLogin);
async function doLogin() {
  const username = inp.value.trim();
  const password = pwd.value;
  if (!username || !password) { showError('Enter username and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Login failed.'); return; }
    sessionStorage.setItem('autorent_token', data.token);
    sessionStorage.setItem('autorent_user', JSON.stringify(data.user));
    window.location.href = '/index.html';
  } catch (e) {
    showError('Cannot connect to server. Is the backend running?');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
function showError(msg) {
  err.textContent = msg; err.style.display = 'block';
  btn.disabled = false; btn.textContent = 'Sign In';
}
</script>
</body>
</html>
