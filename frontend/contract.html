<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoRent — Rental Contract</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f8fafc;color:#0f172a;font-size:14px}
    .page-wrap{max-width:780px;margin:0 auto;padding:32px 24px}
    @media print{body{background:#fff}.no-print{display:none!important}.page-wrap{padding:0}
      .contract{border:none!important;box-shadow:none!important;padding:20px 0!important}}
    .no-print{display:flex;justify-content:flex-end;margin-bottom:20px;gap:8px}
    .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:none;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:#f43f5e;color:#fff}
    .btn-outline{background:#fff;color:#0f172a;border:1px solid rgba(15,23,42,0.12)}
    .contract{background:#fff;border:1px solid rgba(15,23,42,0.08);border-radius:12px;padding:48px;box-shadow:0 2px 12px rgba(15,23,42,0.06)}
    .contract-header{text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:2px solid #0f172a}
    .company-name{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;letter-spacing:-0.5px}
    .company-name span{color:#f43f5e}
    .contract-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin:10px 0 6px;color:#0f172a}
    .contract-sub{font-size:12px;color:#64748b}
    .ref-bar{display:flex;justify-content:space-between;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 16px;margin-bottom:28px;font-size:12px}
    .ref-item strong{font-size:13px;color:#0f172a}
    h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#0f172a;background:#f8fafc;border-left:3px solid #f43f5e;padding:6px 10px;margin:24px 0 12px}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:8px}
    .detail-row{display:contents}
    .d-label{font-size:12px;color:#64748b;padding:9px 14px;border-bottom:1px solid #f1f5f9;border-right:1px solid #f1f5f9;background:#fafafa}
    .d-val{font-size:13px;font-weight:500;color:#0f172a;padding:9px 14px;border-bottom:1px solid #f1f5f9}
    .terms{font-size:12.5px;color:#475569;line-height:1.9;margin-bottom:8px}
    .terms ol{padding-left:18px}
    .terms li{margin-bottom:6px}
    .sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:40px}
    .sig-box{text-align:center}
    .sig-line{border-top:1px solid #0f172a;padding-top:8px;font-size:12px;color:#475569}
    .sig-label{font-size:12px;font-weight:600;color:#0f172a;margin-bottom:48px}
    .loading-state{text-align:center;padding:80px 20px;color:#94a3b8}
    .error-state{text-align:center;padding:80px 20px;color:#b91c1c}
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="no-print">
    <button class="btn btn-outline" onclick="window.close()">← Close</button>
    <button class="btn btn-primary" onclick="window.print()">🖨 Print Contract</button>
  </div>
  <div id="contract-content">
    <div class="loading-state">Loading contract...</div>
  </div>
</div>
<script>
  const params   = new URLSearchParams(window.location.search);
  const rentalId = params.get('id');
  const token    = sessionStorage.getItem('autorent_token');

  if (!rentalId) {
    document.getElementById('contract-content').innerHTML =
      '<div class="error-state">No rental ID provided.</div>';
  } else {
    fetch(`/api/invoice/${rentalId}`, {
      headers: token ? { 'Authorization': `Bearer ${token}` } : {},
    })
    .then(r => r.json())
    .then(d => { if (d.error) throw new Error(d.error); renderContract(d); })
    .catch(e => {
      document.getElementById('contract-content').innerHTML =
        `<div class="error-state">Error: ${e.message}</div>`;
    });
  }

  function fmt(n) { return '₱' + Number(n).toLocaleString(); }
  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-PH', { month:'long', day:'numeric', year:'numeric' });
  }

  function renderContract(d) {
    const { rental, vehicle, customer, company } = d;
    document.title = `Rental Contract #${rental.id} — AutoRent`;
    const today = new Date().toLocaleDateString('en-PH', { month:'long', day:'numeric', year:'numeric' });

    document.getElementById('contract-content').innerHTML = `
      <div class="contract">
        <div class="contract-header">
          <div class="company-name">Auto<span>Rent</span></div>
          <div style="font-size:12px;color:#64748b;margin-top:4px">
            ${company.address} · ${company.phone}
          </div>
          <div class="contract-title">Vehicle Rental Agreement</div>
          <div class="contract-sub">This agreement is entered into on <strong>${today}</strong></div>
        </div>

        <div class="ref-bar">
          <div><div style="color:#64748b;font-size:11px;margin-bottom:2px">Contract No.</div><strong>CTR-${String(rental.id).padStart(4,'0')}</strong></div>
          <div><div style="color:#64748b;font-size:11px;margin-bottom:2px">Date</div><strong>${today}</strong></div>
          <div><div style="color:#64748b;font-size:11px;margin-bottom:2px">Rental Period</div><strong>${fmtDate(rental.start_date)} – ${fmtDate(rental.end_date)}</strong></div>
          <div><div style="color:#64748b;font-size:11px;margin-bottom:2px">Total Amount</div><strong style="color:#f43f5e">${fmt(rental.total_amount)}</strong></div>
        </div>

        <h3>Renter Information</h3>
        <div class="detail-grid">
          <div class="d-label">Full Name</div><div class="d-val">${customer.first_name} ${customer.last_name}</div>
          <div class="d-label">Contact Number</div><div class="d-val">${customer.phone || '—'}</div>
          <div class="d-label">Email Address</div><div class="d-val">${customer.email || '—'}</div>
          <div class="d-label">Address</div><div class="d-val">${customer.address || '—'}</div>
          <div class="d-label">Driver's License</div><div class="d-val">${customer.license_no || '—'}</div>
        </div>

        <h3>Vehicle Information</h3>
        <div class="detail-grid">
          <div class="d-label">Vehicle</div><div class="d-val">${vehicle.year} ${vehicle.make} ${vehicle.model}</div>
          <div class="d-label">Plate Number</div><div class="d-val">${vehicle.plate}</div>
          <div class="d-label">Type</div><div class="d-val">${vehicle.type}</div>
          <div class="d-label">Daily Rate</div><div class="d-val">${fmt(vehicle.daily_rate)}</div>
          <div class="d-label">Start Date</div><div class="d-val">${fmtDate(rental.start_date)}</div>
          <div class="d-label">Return Date</div><div class="d-val">${fmtDate(rental.end_date)}</div>
          <div class="d-label">Duration</div><div class="d-val">${rental.days} day${rental.days !== 1 ? 's' : ''}</div>
          <div class="d-label">Total Amount</div><div class="d-val" style="color:#f43f5e;font-weight:600">${fmt(rental.total_amount)}</div>
        </div>

        <h3>Terms and Conditions</h3>
        <div class="terms">
          <ol>
            <li>The renter agrees to return the vehicle on or before <strong>${fmtDate(rental.end_date)}</strong> in the same condition as received, with a full tank of fuel.</li>
            <li>The renter is responsible for all traffic violations, fines, and penalties incurred during the rental period.</li>
            <li>The renter shall not sub-rent, lend, or allow any unauthorized person to drive the vehicle.</li>
            <li>In case of an accident, the renter must immediately notify <strong>${company.name}</strong> at <strong>${company.phone}</strong> and file a police report.</li>
            <li>The renter is liable for any damage to the vehicle caused by negligence, misuse, or violation of this agreement.</li>
            <li>Late returns will incur an additional charge of <strong>${fmt(vehicle.daily_rate)}</strong> per day.</li>
            <li>The vehicle must not be taken outside the agreed service area without prior written consent from ${company.name}.</li>
            <li>The renter acknowledges receiving the vehicle in good working condition and accepts full responsibility from the time of release until return.</li>
          </ol>
        </div>

        <div class="sig-grid">
          <div class="sig-box">
            <div class="sig-label">Renter's Signature</div>
            <div class="sig-line">${customer.first_name} ${customer.last_name}<br>Date: _______________________</div>
          </div>
          <div class="sig-box">
            <div class="sig-label">Authorized by ${company.name}</div>
            <div class="sig-line">Signature over Printed Name<br>Date: _______________________</div>
          </div>
        </div>
      </div>`;
  }
</script>
</body>
</html>
